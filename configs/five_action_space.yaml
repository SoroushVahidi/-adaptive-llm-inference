# configs/five_action_space.yaml
#
# Canonical 5-action routing target space for the learned 5-way router.
#
# This file is the single authoritative registry that enumerates the five
# inference actions used as routing targets.  All training, evaluation, and
# oracle-construction code for the 5-way router should reference this file.
#
# Design principles
# -----------------
# 1. Clear cost ordering: each action occupies a distinct or near-distinct
#    token-call budget tier (1, 2, 2, 3, 3).
# 2. Meaningful behavioral differences: actions differ in generation
#    strategy (single-pass, sequential revision, parallel voting, structured
#    critique), not just in minor prompt wording.
# 3. All five actions are fully implemented end-to-end in the repository
#    (status: implemented in configs/action_space_catalog.yaml).
# 4. A 5th action (direct_plus_critique_plus_final) is added on top of the
#    existing 4-action MULTI_ACTION_ORACLE_STRATEGIES set to form a richer
#    routing space.
#
# Data requirement note
# ---------------------
# The existing enriched routing CSVs (data/real_*_enriched.csv) record
# per-query outcomes for actions A0 and A1 only (reasoning_correct,
# revise_correct).  Per-query outcome columns for A2, A3, A4 must be
# generated by running scripts/run_build_multi_action_dataset.py on the four
# main regimes.  See docs/FIVE_ACTION_ROUTING_PLAN.md for the full blocker
# analysis and next-step roadmap.
#
# Router training note
# --------------------
# The current learned router (src/routing/learned_router/) uses a binary
# label (escalate to DPR or not).  For 5-way routing, the label construction
# in src/routing/learned_router/features.py must be extended to produce a
# 5-class target using per-query oracle assignment logic analogous to
# src/evaluation/multi_action_routing.py:best_accuracy_action().

# ─────────────────────────────────────────────────────────────────────────────
# 5-action set
# ─────────────────────────────────────────────────────────────────────────────

actions:

  - id: A0
    name: reasoning_greedy
    short_label: RG
    description: >
      Single chain-of-thought pass; no revision or sampling.
      The cheapest possible inference action and the default cheap route
      used in the existing binary routing setup.
    prompt_types: [reasoning]
    sample_count: 1
    stage_structure: one_shot
    model_slot: cheap_model
    cost_proxy: 1          # 1 model call
    cost_tier: lowest
    role_in_router: >
      Cheap fallback for easy queries where a single reasoning pass is
      sufficient.  Anchor of the cost-accuracy Pareto curve.
    catalog_status: implemented
    code_paths:
      - src/baselines/greedy.py
      - src/evaluation/strategy_expansion_eval.py   # run_reasoning_greedy
      - src/evaluation/oracle_subset_eval.py        # _ORACLE_RUNNERS["reasoning_greedy"]
    outcome_data_in_routing_csv: true
    outcome_column: reasoning_correct
    cost_column: reasoning_cost

  - id: A1
    name: direct_plus_revise
    short_label: DPR
    description: >
      Direct first-pass answer followed by an explicit self-revision stage.
      The expensive action in the existing binary routing setup (paper's
      main costly action).
    prompt_types: [direct, revise]
    sample_count: 1
    stage_structure: direct_then_revise
    model_slot: cheap_model
    cost_proxy: 2          # 2 model calls (direct + revise)
    cost_tier: low-medium
    role_in_router: >
      Sequential self-correction for queries where a single pass is likely
      wrong but the model can recover via revision.  Core paper action.
    catalog_status: implemented
    code_paths:
      - src/evaluation/strategy_expansion_eval.py   # run_direct_plus_revise
      - src/evaluation/oracle_subset_eval.py        # _ORACLE_RUNNERS["direct_plus_revise"]
    outcome_data_in_routing_csv: true
    outcome_column: revise_correct
    cost_column: revise_cost

  - id: A2
    name: reasoning_then_revise
    short_label: RTR
    description: >
      Chain-of-thought first pass followed by a revision stage that is
      conditioned on the full reasoning trace.  Combines depth of reasoning
      with the error-correction benefit of revision.
    prompt_types: [reasoning, revise]
    sample_count: 2
    stage_structure: reasoning_then_revise
    model_slot: cheap_model
    cost_proxy: 2          # 2 model calls (reasoning + revise)
    cost_tier: low-medium
    role_in_router: >
      Useful for queries where both deeper reasoning AND a correction pass
      are needed.  Behaviorally distinct from DPR: uses CoT in the first
      stage rather than a direct answer.
    catalog_status: implemented
    code_paths:
      - src/evaluation/strategy_expansion_eval.py   # run_reasoning_then_revise
      - src/evaluation/oracle_subset_eval.py        # _ORACLE_RUNNERS["reasoning_then_revise"]
    outcome_data_in_routing_csv: false
    outcome_column: reasoning_then_revise__correct    # MUST be generated
    cost_column: reasoning_then_revise__cost_proxy    # MUST be generated
    blocker: >
      Per-query outcome columns do not exist in the current enriched routing
      CSVs.  Must run scripts/run_build_multi_action_dataset.py (with
      MULTI_ACTION_ORACLE_STRATEGIES extended to include this action) on all
      four main regimes to generate the required outcome data.

  - id: A3
    name: self_consistency_3
    short_label: SC3
    description: >
      Three independent chain-of-thought samples followed by majority vote.
      Diversity-based approach: correct answer wins by plurality.
    prompt_types: [reasoning]
    sample_count: 3
    stage_structure: parallel_vote
    model_slot: cheap_model
    cost_proxy: 3          # 3 parallel model calls
    cost_tier: medium
    role_in_router: >
      Useful for queries where a single CoT occasionally mistakes but where
      three independent samples reliably converge.  Distinct from sequential
      revision: parallelism vs. iterative self-correction.
    catalog_status: implemented
    code_paths:
      - src/evaluation/strategy_expansion_eval.py   # run_self_consistency_3
      - src/evaluation/oracle_subset_eval.py        # _ORACLE_RUNNERS["self_consistency_3"]
    outcome_data_in_routing_csv: false
    outcome_column: self_consistency_3__correct      # MUST be generated
    cost_column: self_consistency_3__cost_proxy      # MUST be generated
    blocker: >
      Per-query outcome columns do not exist in the current enriched routing
      CSVs.  Same generation step as A2: covered by
      scripts/run_build_multi_action_dataset.py.

  - id: A4
    name: direct_plus_critique_plus_final
    short_label: DCPF
    description: >
      Three-stage pipeline: direct answer → structured critique of that
      answer → final revised answer conditioned on the critique.  The
      critique stage forces an explicit evaluation of the initial response
      before committing to a final answer.
    prompt_types: [direct, critique, revise]
    sample_count: 1
    stage_structure: direct_then_critique_then_final
    model_slot: cheap_model
    cost_proxy: 3          # 3 sequential model calls
    cost_tier: medium
    role_in_router: >
      Highest-cost action in the set.  Appropriate for hard queries where
      structured critical evaluation is needed — not just a revision but an
      intermediate critique step that reasons about the error before
      regenerating a final answer.  Distinct from A1/A2 by its explicit
      intermediate critique stage.
    catalog_status: implemented
    code_paths:
      - src/evaluation/expanded_strategy_eval.py    # run_direct_plus_critique_plus_final
      - src/evaluation/oracle_subset_eval.py        # _ORACLE_RUNNERS["direct_plus_critique_plus_final"]
    outcome_data_in_routing_csv: false
    outcome_column: direct_plus_critique_plus_final__correct  # MUST be generated
    cost_column: direct_plus_critique_plus_final__cost_proxy  # MUST be generated
    blocker: >
      Per-query outcome columns do not exist in the current enriched routing
      CSVs.  Must be added to MULTI_ACTION_ORACLE_STRATEGIES and generated
      via scripts/run_build_multi_action_dataset.py.
      NOTE: this action is NOT in the current MULTI_ACTION_ORACLE_STRATEGIES
      list in src/evaluation/oracle_subset_eval.py — that list must be
      extended before the generation script can produce outcome data for it.

# ─────────────────────────────────────────────────────────────────────────────
# Cost ordering summary (call-count proxy)
# ─────────────────────────────────────────────────────────────────────────────

cost_order:
  - {action: reasoning_greedy,               cost_proxy: 1}
  - {action: direct_plus_revise,             cost_proxy: 2}
  - {action: reasoning_then_revise,          cost_proxy: 2}
  - {action: self_consistency_3,             cost_proxy: 3}
  - {action: direct_plus_critique_plus_final, cost_proxy: 3}

# ─────────────────────────────────────────────────────────────────────────────
# Router label construction (for the 5-way training dataset)
# ─────────────────────────────────────────────────────────────────────────────

label_construction:
  objective: best_accuracy_oracle
  description: >
    For each query, the training label is the action that achieves the
    highest correctness score.  Ties are broken by lowest cost_proxy, then
    by the canonical action order (A0 < A1 < A2 < A3 < A4).
  tie_break_order:
    - cost_proxy       # prefer cheaper
    - canonical_id     # A0 < A1 < A2 < A3 < A4
  oracle_function: src/evaluation/multi_action_routing.py::best_accuracy_action
  note: >
    Cost-penalised labels (best_utility_action_lambda_*) from
    multi_action_routing.py are also supported for soft/cost-aware routing.

# ─────────────────────────────────────────────────────────────────────────────
# Required data artifacts (5-action routing dataset)
# ─────────────────────────────────────────────────────────────────────────────

required_datasets:
  - regime: gsm8k_random_100
    source_csv: data/real_gsm8k_routing_dataset_enriched.csv
    target_5action_csv: data/five_action_gsm8k_random_100.csv
    status: not_generated
  - regime: hard_gsm8k_100
    source_csv: data/real_hard_gsm8k_routing_dataset_enriched.csv
    target_5action_csv: data/five_action_hard_gsm8k_100.csv
    status: not_generated
  - regime: hard_gsm8k_b2
    source_csv: data/real_hard_gsm8k_b2_routing_dataset_enriched.csv
    target_5action_csv: data/five_action_hard_gsm8k_b2.csv
    status: not_generated
  - regime: math500_100
    source_csv: data/real_math500_routing_dataset_enriched.csv
    target_5action_csv: data/five_action_math500_100.csv
    status: not_generated

# ─────────────────────────────────────────────────────────────────────────────
# Runnable status summary
# ─────────────────────────────────────────────────────────────────────────────

runnable_status:
  A0_reasoning_greedy:               runnable
  A1_direct_plus_revise:             runnable
  A2_reasoning_then_revise:          blocked_no_outcome_data
  A3_self_consistency_3:             blocked_no_outcome_data
  A4_direct_plus_critique_plus_final: blocked_no_outcome_data_and_missing_from_multi_action_order
