data:
  candidate_rows_csv: outputs/hybrid_routing_dataset/candidate_rows.csv
  prompt_level_dataset_csv: data/routing_ml_dataset.csv
  regimes: ["gsm8k_random_100", "hard_gsm8k_100", "hard_gsm8k_b2", "math500_100"]

output_dir: outputs/improved_tree_router/pooled
seed: 42
target: {type: success_binary}
models: [decision_tree, bagging_tree, random_forest, gradient_boosting, adaboost]
tuning: {enabled: false}
calibration: {method: sigmoid}
features: {include_regime_indicator: true, include_action_indicator: true}
utility: {name: expected_correct_minus_lambda_cost, lambda: 1.0, beta_uncertainty: 0.0}
downstream:
  selector: mckp_exact
  avg_budget_per_prompt: 1.2
  optimizer_params: {cost_scale: 100}
training:
  scenarios: [pooled, per_regime, leave_one_regime_out]

model_params:
  decision_tree: {max_depth: 6, min_samples_leaf: 2, min_samples_split: 2}
  bagging_tree: {max_depth: 6, min_samples_leaf: 2, min_samples_split: 2, n_estimators: 200}
  random_forest: {max_depth: 8, min_samples_leaf: 2, min_samples_split: 2, n_estimators: 300, max_features: sqrt}
  gradient_boosting: {max_depth: 3, min_samples_leaf: 2, min_samples_split: 2, n_estimators: 200, learning_rate: 0.05}
  adaboost: {base_max_depth: 1, n_estimators: 200, learning_rate: 0.05}

