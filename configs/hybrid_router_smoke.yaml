data:
  candidate_rows_csv: outputs/hybrid_routing_dataset/candidate_rows.csv

output_dir: outputs/hybrid_strategy_recommender/smoke

split:
  seed: 42

features:
  families:
    - prompt_features
    - action_features
    - interaction_features
    - heuristic_features
    - risk_features

heuristics:
  enabled: true
  rules:
    - prune_dominated_cost
    - cheap_safe
    - revise_favorable
    - answer_format_risk
    - ambiguity_penalty

model:
  type: logistic
  calibration: sigmoid
  params:
    max_iter: 1000

utility:
  name: expected_correct_minus_lambda_cost
  lambda: 0.8
  beta_uncertainty: 0.05

optimizer:
  type: greedy_upgrade
  params:
    cost_scale: 100

budget:
  avg_budget_per_prompt: 1.2

ablation:
  run_all: true

