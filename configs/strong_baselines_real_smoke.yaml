# Minimal real OpenAI smoke (2 queries per dataset) for CI/agent verification.
model:
  type: openai
  model: gpt-4o-mini
  greedy_temperature: 0.0
  temperature: 0.7
  max_tokens: 512
  timeout_seconds: 90.0

max_samples: 2
cache_dir: data
out_dir: outputs/baselines
# Ladder-only for fast API verification (full routers: set all to true)
evaluate:
  confidence_router: false
  output_router: false
  best_route_style: false

datasets:
  - hard_gsm8k
  - math500
  - aime2024
  - gpqa_diamond
